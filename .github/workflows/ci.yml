name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -r requirements.txt 2>/dev/null || echo "No requirements.txt"
      - run: python -m pytest --import-mode=importlib 2>/dev/null || echo "No tests found"
